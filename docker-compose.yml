version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: saas_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: saas_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pwhsec_mock"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saas_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=saas_platform
      - REDIS_HOST=redis
      - JWT_SECRET=supersecretjwtkeychangeinproduction
      - JWT_REFRESH_SECRET=supersecretjwtrefreshkeychangeinproduction
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - AWS_REGION=ap-south-1
      - SOCKET_PORT=5001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: saas_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  adminer:
    image: adminer:latest
    container_name: saas_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: saas_stripe_cli
    restart: unless-stopped
    command: listen --forward-to backend:5000/api/webhooks/stripe
    environment:
      - STRIPE_API_KEY=${STRIPE_API_KEY}

volumes:
  mysql_data:
  redis_data: